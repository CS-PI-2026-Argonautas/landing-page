<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Argonautas</title>
  
  <link rel="stylesheet" href="../css/main.css">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&family=Orbitron:wght@800&family=Prosto+One&display=swap" rel="stylesheet">
</head>

<body class="content-grid">
  <header>
    <div class="container-cabecalho">
      <div class="area-logo-cabecalho">
        <img src="../img/logo_argonautas.png" alt="Logo Argonautas" class="imagem-logo-cabecalho">
        <h1 class="nome-site">ARGONAUTAS</h1>
      </div>
      
      <nav class="navegacao-cabecalho">
        <a href="#">CONTATO</a>
        <a href="#">SOBRE</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="secao-hero">
      <div class="area-texto-hero">
        <h2 class="titulo-hero">INOVAÇÃO NA <br> PALMA DAS SUAS <br> MÃOS</h2>
        <a href="#" class="botao-acao-principal">COMECE SEU FUTURO</a>
      </div>
      <div class="area-imagem-hero">
        <img src="../img/imagem1.png" alt="Ilustração" class="imagem-hero">
      </div>
    </section>
  </main>

  <footer>
    <div class="container-rodape">
      <div class="conteudo-esquerda-rodape">
        <span class="texto-rodape">QUEM SOMOS NÓS?</span>
        <img src="../img/gitEinsta.png" alt="Redes Sociais" class="icone-rodape">
      </div>
      
      <div class="conteudo-direita-rodape">
        <img src="../img/logo-IF.png" alt="Logo IF" class="logo-instituicao-rodape">
      </div>
    </div>
  </footer>
</body>
</html>
