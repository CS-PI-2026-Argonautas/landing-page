  <header class="header">

        <div id="contato">

        <p>(99) 99999-9999</p>

        <div id="redes-sociais">
           <img src="/assets/linkedin.svg" alt="">
          <img src="/assets/instagram.svg" alt="">
          <img src="/assets/github.svg" alt="">
        </div>
        </div> 
        
       
      </div>
      <div>
        <form class="contato-form">
  <div class="row">

      <label>Nome</label>

    <label>Seu melhor email</label>
    <input type="email">
  </div>

  <div class="field">
    <label>Mensagem</label>

</form>

        <div class="secao">
          <h1>ORGANIZAÇÃO</h1>
