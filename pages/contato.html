<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Equipe Argonautas</title>
    
    <link rel="stylesheet" href="../css/contacts.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Zain:ital,wght@0,200;0,300;0,400;0,700;0,800;0,900;1,300;1,400&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
  
  </head>

  

  <body>
    <header class="header">
            <iframe src="navbar.html" class="iframe-navbar" scrolling="no" frameborder="0"></iframe>
    </header>


     <main>
        <div id="info">
          <div id="titulo">
            <h1>SEJA NOSSO PRÓXIMO CLIENTE</h1>
          </div>
          <div id="contato">      
            <p>exemplo@mail.com</p>
            <p>(99) 99999-9999</p>

            <div id="redes-sociais">
              <a href="https://linkedin.com" aria-label="Acessar nosso repositório no GitHub">
                <img src="/assets/linkedin.svg" alt="Logotipo do LinkedIn">
              </a>
              <a href="https://github.com/CS-PI-2026-Argonautas" aria-label="Acessar nosso repositório no GitHub">
                <img src="/assets/github.svg" alt="Logotipo do GitHub">
              </a>
              <a href="https://instagram.com" aria-label="Siga-nos no Instagram">
                <img src="/assets/instagram.svg" alt="Logotipo do Instagram">
              </a>
            </div>
          </div>
        </div> 
        
       
        <div>
          <form class="contato-form">
            <div class="row">
              <div class="field">
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
              </div>
              <div class="field">
                <label for="sobrenome">Sobrenome</label>
                <input type="text" id="sobrenome" name="sobrenome" placeholder="Digite seu sobrenome" required>
              </div>
            </div>

            <div class="field">
              <label for="email">Seu melhor email</label>
              <input type="email" id="email" name="email" placeholder="Digite seu email" required aria-invalid="false" aria-describedby="email-error">
              <span id="email-error" style="color: red; display: none;">Por favor, insira um e-mail válido.</span>
            </div>

            <div class="field">
              <label for="mensagem">Mensagem</label>
              <textarea id="mensagem" name="mensagem" placeholder="Digite sua mensagem" required></textarea>
            </div>
          </form>
        </div>
     
      </main>

      <iframe class="iframe-footer" src="footer.html" scrolling="no"></iframe>
    
  </body>


</html>
