<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/grid.css" />
    <link rel="stylesheet" href="../css/benefits.css" />
    <title>Beneficios e planos</title>
</head>
<body>
    <header class="header">
       <iframe src="pages/navbar.html" class="iframe-navbar"></iframe>
    </header>

<section class="secao">
      <h1 class="titulo">PLANOS</h1>
    <div class="container-planos">
      
        <div class="plano">
            
            <h3>Free trial</h3>
            <div class="linha"></div>
            <div class="preco">R$ 0,00<span>/mês*</span></div>
            <ul>
                <li>Avalie Gratis em seu primeiro mês</li>
                <li>Funcionalidades limitadas</li>
            </ul>
           
        </div>
        <div class="plano">
            <h3>Pro</h3>
            <div class="linha"></div>
            <div class="preco">R$ 99,99<span>/mês</span></div>
            <ul>
                <li>Suporte em horário comercial</li>
                <li>Funcionalidades e views base</li>
            </ul>
            <button class="btn">Assine agora</button>
        </div>
        <div class="plano">
            <h3>Premium</h3>
            <div class="linha"></div>
            <div class="preco">R$ 199,99<span>/mês</span></div>
            <ul>
                <li>Suporte completo 24hrs</li>
                <li>Funcionalidades completas</li>
                <li>Relatórios detalhados</li>
            </ul>
            <button class="btn">Assine agora</button>
        </div>
        </div>
</section>

</body>
</html>
